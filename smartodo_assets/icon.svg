<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #F8F9FA; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #202124; }
      }
    </style>

    <!-- 对勾紫色渐变 -->
    <linearGradient id="check_purple" x1="135" y1="260" x2="377" y2="178" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#BB88FF"/>
      <stop offset="100%" stop-color="#7733DD"/>
    </linearGradient>

    <!-- AI 星星金色渐变 -->
    <radialGradient id="star_gold">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="60%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </radialGradient>

    <!-- 柔和投影 -->
    <filter id="soft_shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 - 自适应亮/暗模式 -->
  <rect class="bg" width="512" height="512"/>

  <!-- 主对勾 -->
  <g filter="url(#soft_shadow)">
    <path
      d="M 135 260 L 215 340 L 377 178"
      stroke="url(#check_purple)"
      stroke-width="58"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"/>
  </g>

  <!-- AI 星星组 -->
  <g>
    <!-- 主星 -->
    <g transform="translate(385, 135)">
      <path
        d="M 0 -40
           C -3 -12, -12 -3, -40 0
           C -12 3, -3 12, 0 40
           C 3 12, 12 3, 40 0
           C 12 -3, 3 -12, 0 -40 Z"
        fill="url(#star_gold)"/>
      <!-- 高光 -->
      <circle r="10" fill="white" opacity="0.6"/>
    </g>

    <!-- 小装饰星 -->
    <g transform="translate(310, 105)" opacity="0.85">
      <path
        d="M 0 -14
           C -2 -5, -5 -2, -14 0
           C -5 2, -2 5, 0 14
           C 2 5, 5 2, 14 0
           C 5 -2, 2 -5, 0 -14 Z"
        fill="#FFCA28"/>
    </g>
  </g>
</svg>
